# Example: the Warden agent running as a native sidecar next to a target JVM.
#
# `restartPolicy: Always` on an initContainer makes it a NATIVE SIDECAR (Kubernetes 1.29+):
# it starts before the app container, stays up for the pod's whole life, and is stopped last.
# That start-before / stop-after ordering is what lets the agent manage the target JVM safely
# for the app's entire lifetime.
#
# Also grants the least-privilege RBAC PodResizeClient (W-201) needs to resize its own pod's
# `app` container: `patch` on the `pods/resize` subresource and `get` on `pods`, scoped by
# resourceNames to this one pod — nothing else in the namespace is touchable.
#
# Requires Kubernetes 1.35+ (in-place pod resize is GA there; verified against a real 1.36
# kind cluster) or an earlier version with the `InPlacePodVerticalScaling` feature gate on.
#
# The `app` container's JMX flags are required, not optional — see the comment on that
# container below, and TargetAttacher's javadoc, for why (bug #55).
#
# The `warden` container's hostPath mount of /sys/fs/cgroup is also required, not optional — see
# the comment on that volume below, and RssReader's javadoc, for why (bug #57). It is a real,
# explicit privilege cost (full-node cgroup visibility for the sidecar); see deploy/README.md.
#
# Apply to a kind cluster (see deploy/README.md); both containers should reach Ready.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: warden-example
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: warden-example-resize
rules:
  - apiGroups: [""]
    resources: ["pods/resize"]
    resourceNames: ["warden-example"]
    verbs: ["patch"]
  - apiGroups: [""]
    resources: ["pods"]
    resourceNames: ["warden-example"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: warden-example-resize
subjects:
  - kind: ServiceAccount
    name: warden-example
roleRef:
  kind: Role
  name: warden-example-resize
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: v1
kind: Pod
metadata:
  name: warden-example
  labels:
    app.kubernetes.io/name: warden-example
spec:
  serviceAccountName: warden-example

  # Lets the Warden sidecar see the target JVM's PID via /proc (W-102's TargetLocator). The
  # actual connection goes over the app's JMX port below, not this — shareProcessNamespace only
  # needs to answer "is there exactly one other JVM, and is it still alive."
  shareProcessNamespace: true

  # Gives the warden container a read-only view of every cgroup on the node, so RssReader
  # (bug #57) can find the app container's own cgroup directory despite cgroup namespacing
  # hiding its real absolute path. There's no Kubernetes-native way to scope a hostPath mount to
  # just one pod's cgroup subtree — that path is assigned by the container runtime after
  # scheduling — so this is a real, explicit cost: the sidecar can see every other pod's cgroup
  # on the node too, not just this one's. Weighed and accepted; see deploy/README.md.
  volumes:
    - name: host-cgroup
      hostPath:
        path: /sys/fs/cgroup
        type: Directory

  initContainers:
    - name: warden
      image: ghcr.io/baokhang83/mnemo-jvm-warden:latest
      imagePullPolicy: IfNotPresent
      restartPolicy: Always # <-- native sidecar
      ports:
        - name: health
          containerPort: 8080
      env:
        # Required (W-306): lets the agent read back its own pod's intent annotations and know
        # which sibling container to resize. No default — guessing wrong here means silently
        # resizing nothing, or resizing the wrong container.
        - name: WARDEN_POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: WARDEN_TARGET_CONTAINER_NAME
          value: app
      volumeMounts:
        - name: host-cgroup
          mountPath: /host-cgroup # must match RssReader.HOST_CGROUP_ROOT
          readOnly: true
      livenessProbe:
        httpGet:
          path: /healthz
          port: health
        periodSeconds: 10
      readinessProbe:
        httpGet:
          path: /readyz
          port: health
        periodSeconds: 5
      resources:
        requests:
          cpu: 25m
          memory: 64Mi
        limits:
          memory: 256Mi

  containers:
    - name: app
      # The target JVM Warden manages. A real long-running JVM — the JDK's Simple Web Server —
      # explicitly on G1, which the agent's GcDetector recognises. Explicit, not left to JVM
      # ergonomics: verified against a real target that at this container's memory size (512Mi
      # limit), the JVM's own default-collector heuristic actually picks Serial GC, not G1 —
      # Collector.OTHER, which AttachedHeapController correctly refuses to manage (§9: verify
      # the actual behavior, don't assume it from a doc-level "G1 is the default" claim).
      #
      # Launched via `java -m jdk.httpserver/...` (what the `jwebserver` launcher wraps), not the
      # `jwebserver` binary itself: verified that binary does not honor JDK_JAVA_OPTIONS the way
      # a plain `java` launch does, so it can't pick up the JMX flags below.
      #
      # The JMX flags are load-bearing, not optional (see TargetAttacher's javadoc for why): the
      # Attach API this used before required the agent to run as real root to reach a target
      # under a different UID — which this container, defaulting to root while the agent hardens
      # to a non-root user, is. `jmxremote.host=127.0.0.1` is itself load-bearing too — verified
      # on a real cluster that without it, this port is reachable from any other pod, not just
      # this one; with it, a separate pod's connection is refused while the sidecar's (same pod,
      # same loopback) still succeeds. `authenticate=false` is only safe because of that binding.
      image: eclipse-temurin:21-jdk
      command:
        - java
        - -XX:+UseG1GC
        - -Dcom.sun.management.jmxremote.port=9999
        - -Dcom.sun.management.jmxremote.rmi.port=9999
        - -Dcom.sun.management.jmxremote.host=127.0.0.1
        - -Dcom.sun.management.jmxremote.authenticate=false
        - -Dcom.sun.management.jmxremote.ssl=false
        - -Djava.rmi.server.hostname=127.0.0.1
        - -m
        - jdk.httpserver/sun.net.httpserver.simpleserver.JWebServer
        - -b
        - "0.0.0.0"
        - -p
        - "8000"
      ports:
        - name: http
          containerPort: 8000
      readinessProbe:
        httpGet:
          path: /
          port: http
        periodSeconds: 5
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          memory: 512Mi
      # A JVM's own heap adapts to a lower/higher container memory limit without needing the
      # container itself to restart (that's the whole point of W-103's SoftMaxHeapSize driver) —
      # so memory resizes apply in place. CPU is left at the kubelet's default resize policy
      # (RestartContainer) since Warden never resizes it.
      resizePolicy:
        - resourceName: memory
          restartPolicy: NotRequired
