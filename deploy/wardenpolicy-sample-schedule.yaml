# Used by verify-wardenpolicy-reconciler.sh to prove real schedule evaluation (W-303)
# deterministically, regardless of what wall-clock time the check happens to run at:
# "* * * * *" has fired within the last minute no matter when this is applied, and "0 0 1 1 *"
# (once a year, Jan 1st) is guaranteed to have last fired further in the past — so "always-on"
# must always win under ScheduleEvaluator's most-recently-fired-wins rule.
apiVersion: warden.mnemo.io/v1alpha1
kind: WardenPolicy
metadata:
  name: warden-policy-sample-schedule
spec:
  targetRef:
    apiVersion: v1
    kind: Pod
    name: warden-example
  timezone: UTC
  profiles:
    always-on:
      request: 128Mi
      limit: 256Mi
    yearly:
      request: 384Mi
      limit: 512Mi
  schedule:
    - cron: "* * * * *"
      profile: always-on
    - cron: "0 0 1 1 *"
      profile: yearly
  # Present so this fixture also proves leadTime deserializes and flows through
  # ScheduleEvaluator.currentProfileWithLeadTime (W-304) without error against a real API
  # server. It has no effect on which profile wins here: "always-on"'s own next occurrence
  # (within the next minute) is always sooner than "yearly"'s (up to ~a year away), so
  # findNextTransition always resolves to "always-on" itself, same as the unadjusted base.
  leadTime:
    shrink: 5m
    warm: 10m
