# A real, minimal Prometheus instance for verify-prometheus-metric-source.sh — official image,
# default config (no scrape targets needed: the demo query is `vector(1)`, a PromQL literal that
# needs no scraped data at all, so this doesn't need to know about anything else in the cluster).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: warden-demo-prometheus
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: warden-demo-prometheus
  template:
    metadata:
      labels:
        app.kubernetes.io/name: warden-demo-prometheus
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:v2.55.1
          ports:
            - name: http
              containerPort: 9090
          readinessProbe:
            httpGet:
              path: /-/ready
              port: http
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: warden-demo-prometheus
spec:
  selector:
    app.kubernetes.io/name: warden-demo-prometheus
  ports:
    - name: http
      port: 9090
      targetPort: http
