name: build

on:
  push:
    branches: [ main ]
  pull_request:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    name: build (JDK 21)
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build and test
        run: mvn -B --no-transfer-progress verify

      - name: Check charts/warden/crds is in sync with the generated CRD
        run: |
          diff -u charts/warden/crds/wardenpolicy-crd.yaml \
                  warden-crd-model/target/classes/META-INF/fabric8/wardenpolicies.warden.mnemo.io-v1.yml || {
            echo "::error::charts/warden/crds/wardenpolicy-crd.yaml is stale — regenerate it from" \
                 "warden-crd-model/target/classes/META-INF/fabric8/wardenpolicies.warden.mnemo.io-v1.yml" \
                 "(mvn -pl warden-crd-model process-classes) and commit the copy."
            exit 1
          }

      - name: Generate JaCoCo badge
        uses: cicirello/jacoco-badge-generator@v2
        with:
          jacoco-csv-file: coverage/target/site/jacoco-aggregate/jacoco.csv
          badges-directory: coverage/target/site/jacoco-aggregate/badges

      - name: Publish coverage report to GitHub Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: coverage/target/site/jacoco-aggregate
