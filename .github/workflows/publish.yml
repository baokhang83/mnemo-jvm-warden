name: publish

on:
  release:
    types: [ published ]

permissions:
  contents: read
  packages: write

jobs:
  image:
    runs-on: ubuntu-latest
    name: build + push image
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/baokhang83/mnemo-jvm-warden:${{ github.event.release.tag_name }}
            ghcr.io/baokhang83/mnemo-jvm-warden:latest
